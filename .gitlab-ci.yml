before_script:
  - apt-get update && apt-get install -y clang
  - curl https://sh.rustup.rs -sSf | sh -s -- -y
  - . "$HOME/.cargo/env"
  - ruby -v
  - which ruby
  - bundle install --jobs=$(nproc) --path=deps "${FLAGS[@]}"
  - bundle clean

test:
  image: ruby: $RUBY_VERSION
  script:
    - bundle exec rake test XML_BACKEND=REXML 2>/dev/null
    - bundle exec rake test XML_BACKEND=Oga 2>/dev/null
    - bundle exec rake test XML_BACKEND=Nokogiri 2>/dev/null
  except:
    - tags
  cache:
    key: ruby:$RUBY_VERSION
    paths:
      - deps
  parallel:
    matrix:
      - RUBY_VERSION: [2.7, 3.0, 3.1, 3.2, 3.3, 3.4]

pages:
  stage: deploy
  image: ruby:3.4
  dependencies:
    - test:3.4
  script:
    - bundle exec rake test doc:yard
    - mv doc public
    - mv coverage public/
  artifacts:
    paths:
      - public
  only:
    - master
  cache:
    key: ruby:3.4
    paths:
      - deps
